<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple JavaScript Counter</title>
    <!-- <link rel="stylesheet" href="style.css"> -->

<style>
    body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.counter-container {
    text-align: center;
    background: white;
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

h1 {
    color: #333;
    margin-bottom: 0.5rem;
}

#value {
    font-size: 4rem;
    font-weight: bold;
    display: block;
    margin-bottom: 1.5rem;
    color: #222;
}

.button-container {
    display: flex;
    gap: 10px;
}

.btn {
    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
}

/* Button specific colors */
.decrease { background-color: #ff4d4d; color: white; }
.reset { background-color: #cccccc; color: #333; }
.increase { background-color: #4caf50; color: white; }

.btn:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

    <div class="counter-container">
        <h1>Counter</h1>
        <span id="value">0</span>
        
        <div class="button-container">
            <button class="btn decrease">Decrease</button>
            <button class="btn reset">Reset</button>
            <button class="btn increase">Increase</button>
        </div>
    </div>

    <script>// Initialize the count variable
let count = 0;

// Select the value element and all buttons
const value = document.getElementById('value');
const decreaseBtn = document.querySelector('.decrease');
const resetBtn = document.querySelector('.reset');
const increaseBtn = document.querySelector('.increase');

// Add event listener for the Increase button
increaseBtn.addEventListener('click', () => {
    count++;
    updateDisplay();
});

// Add event listener for the Decrease button
decreaseBtn.addEventListener('click', () => {
    count--;
    updateDisplay();
});

// Add event listener for the Reset button
resetBtn.addEventListener('click', () => {
    count = 0;
    updateDisplay();
});

// Helper function to update the text on the screen and change colors
function updateDisplay() {
    value.textContent = count;
    
    // Optional: Add a little color flair based on the value
    if (count > 0) {
        value.style.color = "#4caf50"; // Green for positive
    } else if (count < 0) {
        value.style.color = "#ff4d4d"; // Red for negative
    } else {
        value.style.color = "#222";    // Dark grey for zero
    }
}</script>
</body>
</html>
